name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tools on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 neovim

      - name: Install tools on macOS
        if: runner.os == 'macOS'
        run: brew install lua neovim

      - name: Lua syntax
        run: |
          if command -v luac5.4 >/dev/null 2>&1; then
            luac_bin=luac5.4
          else
            luac_bin=luac
          fi

          find lua -name '*.lua' -print0 | xargs -0 "$luac_bin" -p
          find scripts -maxdepth 1 -name '*.lua' -print0 | xargs -0 -r "$luac_bin" -p

      - name: Headless Neovim tests
        run: nvim --headless -u NONE -i NONE -n --cmd "set rtp^=${{ github.workspace }}" -c "luafile tests/run.lua" -c "qa!"

      - name: Clean config install check
        run: bash scripts/check-clean-install.sh

  nix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Flake checks
        run: nix flake check --print-build-logs
